name: sholat_qibla
description: "Miqat — Sholat On Time, Every Time. Jadwal sholat & arah kiblat offline-first."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  audioplayers: ^6.8.1
  cupertino_icons: ^1.0.8
  flutter_compass: ^0.8.1
  flutter_local_notifications: ^22.0.1
  geolocator: ^14.0.3
  get_it: ^9.2.1
  home_widget: ^0.9.3
  intl: any
  shared_preferences: ^2.5.5
  timezone: ^0.11.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

# Konfigurasi ikon peluncur (jalankan: dart run flutter_launcher_icons)
flutter_launcher_icons:
  image_path: "assets/logo/miqat_icon.png"
  android: "ic_launcher"
  min_sdk_android: 21
  adaptive_icon_background: "#FF5A3C"
  adaptive_icon_foreground: "assets/logo/miqat_foreground.png"
  ios: true
  image_path_ios: "assets/logo/miqat_ios.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/logo/miqat_icon.png"
    background_color: "#FCF9F8"
    theme_color: "#FF5A3C"

# Konfigurasi splash native (jalankan: dart run flutter_native_splash:create)
flutter_native_splash:
  color: "#FCF9F8"
  image: "assets/logo/miqat_icon.png"
  android_12:
    image: "assets/logo/miqat_foreground.png"
    color: "#FF5A3C"
  web: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/data/
    - assets/audio/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
